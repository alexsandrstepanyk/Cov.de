services:
  gov-de-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gov-de-bot
    restart: unless-stopped
    env_file:
      - .env.oracle
    environment:
      STORAGE_DIR: /app/storage
      UPLOADS_DIR: /app/storage/uploads
      DATABASE_PATH: /app/storage/users.db
      DATA_DIR: /app/data
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./storage:/app/storage
      - ./storage/pdf_letters:/app/data/pdf_letters
      - ./logs:/app/logs

