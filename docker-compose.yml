version: '3.8'

services:
  gov-de-bot:
    build: .
    container_name: gov-de-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./users.db:/app/users.db
    ports:
      - "5001:5000"
    networks:
      - gov-de-network

networks:
  gov-de-network:
    driver: bridge
