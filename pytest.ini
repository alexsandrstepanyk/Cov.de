# Pytest configuration for Gov.de project

[tool.pytest.ini_options]
# Test paths
testpaths = ["tests"]

# Python files pattern
python_files = ["test_*.py", "*_test.py"]

# Python classes pattern
python_classes = ["Test*"]

# Python functions pattern
python_functions = ["test_*"]

# Add command line options
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
    "-ra",
    "--cov=src",
    "--cov-report=term-missing",
    "--cov-report=html:htmlcov"
]

# Markers
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
    "ocr: marks tests related to OCR functionality",
    "translation: marks tests related to translation",
    "database: marks tests related to database operations",
    "bot: marks tests related to bot functionality"
]

# Filter warnings
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning"
]

# Timeout for tests (in seconds)
timeout = 300

# Log level
log_level = "INFO"

# Log format
log_format = "%(asctime)s %(levelname)s %(message)s"
log_date_format = "%Y-%m-%d %H:%M:%S"
